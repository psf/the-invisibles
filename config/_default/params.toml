#################### default parameters ################################
# favicon
favicon = "images/pypodcats-2025.png"
# logo
logo = "images/pypodcats-2025-s.png"
logo_darkmode = "images/pypodcats-2025-s.png"
# use `px` or `x` with logo_width, example: "100px".
# Note: logo_width is not work with .svg file
logo_width = "100px"
logo_height = "32px"
# if logo_webp set false, will not generate WEBP version of logo | default is true
logo_webp = true
# logo text will only show when logo is missing.
logo_text = "Podcats"
# navbar fixed to top
navbar_fixed = true
# theme-mode
theme_switcher = true
theme_default = "dark" # available options [light/dark/system]
# Main Sections
mainSections = ["episodes"]
# contact form action
#contact_form_action = "https://forms.gle/SWbZpbfeXSNHCPn8A" # contact form works with [https://airform.io/] or [https://formspree.io]
# google tag manager, see https://developers.google.com/tag-manager/
google_tag_manager = "" # example: G-XXXXXXXXXX
google_adsense = ""     # example: ca-pub-xxxxxxxxxxxxxxxx
# custom script on header, example: custom_script= "<script>console.log(\"Hello World\")</script>"
custom_script = ""
# copyright
copyright = "© PyPodcats"

# Popular theme: site identity
tagline = "Stories from the underrepresented group members of the Python community"
description = "Hidden Figures of Python is a podcast series by the PyPodcats team, highlighting voices of the underrepresented group members of the Python community."
brandName = "PyPodcats"
brandSub = "Hidden Figures of Python"
ogImage = "images/podcats_1500x1500.png"

# Preloader
# preloader module: https://github.com/gethugothemes/hugo-modules/tree/master/components/preloader
[preloader]
enable = false
preloader = "" # use jpg, png, svg or gif format.

# Navigation button
[navigation_button]
enable = true
label = "Subscribe"
link = "subscribe/"

# search
# search module: https://github.com/gethugothemes/hugo-modules/tree/master/search
[search]
enable = true
primary_color = "#121212"
include_sections = ["episodes", "blog", "speakers"]
show_image = true
show_description = true
show_tags = true
show_categories = true


# seo meta data for OpenGraph / Twitter Card
# seo module: https://github.com/gethugothemes/hugo-modules/tree/master/seo-tools/basic-seo
[metadata]
keywords = ["Python", "Podcasts", "Community", "Interviews"]
description = "Hidden Figures of Python Podcast"

author = "PyPodcats Team"
image = "images/pypodcats-2025-s.png"


# site verifications
# verification module: https://github.com/gethugothemes/hugo-modules/tree/master/seo-tools/site-verifications
[site_verification]
google = ""   # Your verification code
bing = ""     # Your verification code
baidu = ""    # Your verification code
facebook = "" # Your verification code
mastodon = "https://fosstodon.org/@pypodcats" # Your verification code

# cookies
# cookies module: https://github.com/gethugothemes/hugo-modules/tree/master/components/cookie-consent
[cookies]
enable = false
expire_days = 60
content = "This site uses cookies. By continuing to use this website, you agree to their use."
button = "I Accept"

######################## sidebar widgets #########################
[widgets]
sidebar = ["categories", "tags"]


# Subscription
[subscription]
enable = false
# mailchimp subsciption
mailchimp_form_action = "" # replace this url with yours
mailchimp_form_name = ""

# Popular theme: brand tokens, from the PyPodcats design system
# (base palette sampled from the PyPodcats logo; see design system HANDOFF.md)
[brand]
primary = "#A76E1F"        # brand caramel (brown-500)
primaryHover = "#96631B"   # brown-600
primaryActive = "#7E5314"  # brown-700
secondary = "#4A6A95"      # mic base deep blue (blue-500)
accent = "#EBB354"         # snake yellow (sun-500)
accentHover = "#D6813E"    # snake belly (orange-500)
ink = "#45340F"            # warm near-black for text (ink-900)
link = "#4A6A95"           # text-link (blue-500)
linkHover = "#33507D"      # blue-600
surfaceWash = "#F1E2CE"    # cat fur (cream-500)
surfaceWashSoft = "#F8EFDF" # cream-300
surfaceInk = "#A76E1F"     # surface-inverse (brand caramel)
surfacePage = "#FDFAF3"    # page paper (cream-100)
surfaceCard = "#FFFFFF"
surfaceTertiary = "#F8EFDF" # cream-300
textBody = "#45340F"       # ink-900
textMuted = "#9A8A6B"      # ink-400
textOnBrand = "#FFFFFF"
borderSubtle = "#EAE0CC"   # border-hairline
fontSans = "Nunito, system-ui, sans-serif"
fontDisplay = "'Baloo 2', Nunito, sans-serif"
radiusCard = "24px"        # signature card radius

# Popular theme: header call to action
[cta]
label = "Subscribe"
url = "/subscribe/"
icon = "fa-solid fa-podcast"

# Popular theme: footer social icons
[[social]]
